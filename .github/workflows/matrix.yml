name: Matrix demo con inclusiones y exclusiones

on: 
  push:

jobs:
  build:
    continue-on-error: true

    strategy:
      matrix:
        node-version: [12, 14, 16]
        sistema-operativo: [ubuntu-latest, windows-latest]
        include:
          - node-version: 18
            sistema-operativo: ubuntu-latest
        exlucude:
          - node-version: 18
            sistema-operativo: ubuntu-latest

    runs-on: ${{ matrix.sistema-operativo }}

    steps:
      - name: get code
        uses: actions/checkout@v3

      - name: install node js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        run: npm ci

      - name: build project
        run: npm run build
