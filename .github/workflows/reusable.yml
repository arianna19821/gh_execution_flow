name: Reusable deloy
on:
  workflow_call:
    inputs:
      myartifact_aroa-name:
        description: es el nombre del artefacto
        required: false
        default: dist
        type: string
    secrets:
      my_secreto:
          required: false
    outputs:
      result:
        description: es el nombre del artefacto
        value: ${{jobs.deploy.outputs.valor_retorno}}
        
        
jobs:
  deploy:
    outputs:
      valor_retorno: ${{steps.set-result.outputs.step-result-success}}
      
    runs-on: ubuntu-latest
    steps:
      - name:  get code
        uses: actions/download-artifact@v4
        with:
          name: ${{inputs.myartifact_aroa-name}}
      - name: listar archivos
        run: ls
          
      - name: outpunt information
        run: echo "deploy sistem"

      - name: salida de informacion
        id: set-result
        run: echo "step-result-success">>$GITHUB_OUTPUT
